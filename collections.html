<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collections • VELOURA</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Cinzel:wght@600&family=Cinzel+Decorative&family=Sofia&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="nav-wrap">
        <h1 class="logo">VELOURA</h1>
        <nav class="nav">
          <a href="index.html" data-nav>Home</a>
          <a href="collections.html" class="active" data-nav>Collections</a>
          <a href="index.html#about" data-nav>About</a>
          <a href="index.html#contact" data-nav>Contact</a>
        </nav>
        <div class="header-actions">
          <button
            id="theme-toggle"
            class="icon-btn"
            aria-label="Toggle theme"
            title="Toggle theme"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path
                d="M12 3a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1Zm6.364 2.05a1 1 0 0 1 0 1.414l-.707.707a1 1 0 0 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 0ZM21 11a1 1 0 1 1 0 2h-1a1 1 0 1 1 0-2h1ZM6.05 5.05a1 1 0 0 1 1.414 0l.707.707A1 1 0 1 1 6.757 7.17l-.707-.707a1 1 0 0 1 0-1.414ZM12 18a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1Zm7.071-1.071a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 1 1 1.414-1.414l.707.707ZM4 11a1 1 0 1 1 0 2H3a1 1 0 1 1 0-2h1Zm2.636 6.95a1 1 0 0 1 1.414 0l.707.707A1 1 0 0 1 7.343 20.07l-.707-.707a1 1 0 0 1 0-1.414ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Z"
              />
            </svg>
          </button>
          <select id="currency" title="Currency">
            <option value="AUD">AUD</option>
            <option value="USD">USD</option>
          </select>
          <button
            id="cart-button"
            class="icon-btn"
            aria-label="Open cart"
            title="Cart"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path
                d="M7 4h-.76a1 1 0 1 1 0-2H7a3 3 0 0 1 2.83 2h8.77a1 1 0 0 1 .98 1.2l-1.8 9a2 2 0 0 1-1.96 1.6H9.5a2 2 0 0 1-1.96-1.6L6.18 6H5a1 1 0 1 1 0-2h1.1A3 3 0 0 1 7 4Zm3.5 16a1.75 1.75 0 1 1 0 3.5 1.75 1.75 0 0 1 0-3.5Zm7 0a1.75 1.75 0 1 1 0 3.5 1.75 1.75 0 0 1 0-3.5Z"
              />
            </svg>
            <span id="cart-badge" class="badge">0</span>
          </button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search products…" />
        <div class="chips" id="filters">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="dresses">Dresses</button>
          <button class="chip" data-filter="bags">Bags</button>
          <button class="chip" data-filter="jewellery">Jewellery</button>
        </div>
        <select id="sort">
          <option value="featured">Sort: Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A → Z</option>
          <option value="name-desc">Name: Z → A</option>
        </select>
      </div>

      <div id="grid" class="product-grid">
        <!-- Dresses -->
        <article
          class="product-card"
          data-category="dresses"
          data-name="Dresses"
          data-price="149.99"
          data-desc="Modern silhouette with artisanal details."
          data-tags="new,bestseller"
        >
          <div class="media">
            <img
              src="assets/images/image1.jpg"
              alt="Dress"
              loading="lazy"
              decoding="async"
            />
            <span class="tag badge-new">New</span>
            <span class="tag badge-hit">Bestseller</span>
          </div>
          <h3>Dresses</h3>
          <p class="price" data-currency="$">$149.99</p>
          <div class="card-actions">
            <button class="btn ghost quick-view" data-quick>Quick View</button>
            <button class="btn add-cart" data-id="dress-1">Add to Cart</button>
          </div>
        </article>

        <!-- Bags -->
        <article
          class="product-card"
          data-category="bags"
          data-name="Bags"
          data-price="39.99"
          data-desc="Compact crossbody with premium hardware."
          data-tags="limited"
        >
          <div class="media">
            <img
              src="assets/images/bag1.jpeg"
              alt="Bag"
              loading="lazy"
              decoding="async"
            />
            <span class="tag badge-ltd">Limited</span>
          </div>
          <h3>Bags</h3>
          <p class="price" data-currency="$">$39.99</p>
          <div class="card-actions">
            <button class="btn ghost quick-view" data-quick>Quick View</button>
            <button class="btn add-cart" data-id="bag-1">Add to Cart</button>
          </div>
        </article>

        <!-- Jewellery -->
        <article
          class="product-card"
          data-category="jewellery"
          data-name="Jewellery"
          data-price="19.99"
          data-desc="Hand-finished earrings with hypoallergenic metal."
          data-tags="eco"
        >
          <div class="media">
            <img
              src="assets/images/accessory1.jpeg"
              alt="Jewellery"
              loading="lazy"
              decoding="async"
            />
            <span class="tag badge-eco">Eco</span>
          </div>
          <h3>Jewellery</h3>
          <p class="price" data-currency="$">$19.99</p>
          <div class="card-actions">
            <button class="btn ghost quick-view" data-quick>Quick View</button>
            <button class="btn add-cart" data-id="jewel-1">Add to Cart</button>
          </div>
        </article>

        <article
          class="product-card"
          data-category="accessories"
          data-name="Lehanga"
          data-price="24.99"
          data-desc="Lightweight chiffon lehenga with soft drape."
          data-tags="trending"
        >
          <div class="media">
            <img
              src="assets/images/lehenga.webp"
              alt="Lehanga"
              loading="lazy"
              decoding="async"
            />
            <span class="tag badge-trend">Trending</span>
          </div>
          <h3>Lehanga</h3>
          <p class="price" data-currency="$">$24.99</p>
          <div class="card-actions">
            <button class="btn ghost quick-view" data-quick>Quick View</button>
            <button class="btn add-cart" data-id="scarf-1">Add to Cart</button>
          </div>
        </article>

        <!-- Clutch -->
        <article
          class="product-card"
          data-category="bags"
          data-name="Evening Clutch"
          data-price="59.99"
          data-desc="Sleek satin clutch for nights out."
          data-tags="new"
        >
          <div class="media">
            <img
              src="assets/images/bag1.jpeg"
              alt="Evening Clutch"
              loading="lazy"
              decoding="async"
            />
            <span class="tag badge-new">New</span>
          </div>
          <h3>Evening Clutch</h3>
          <p class="price" data-currency="$">$59.99</p>
          <div class="card-actions">
            <button class="btn ghost quick-view" data-quick>Quick View</button>
            <button class="btn add-cart" data-id="clutch-1">Add to Cart</button>
          </div>
        </article>
      </div>
    </main>

    <!-- Cart Drawer -->
    <aside id="cart-drawer" class="cart-drawer" aria-hidden="true">
      <div class="cart-panel">
        <div class="cart-header">
          <h3>Your Cart</h3>
          <button id="cart-close" class="icon-btn" aria-label="Close cart">
            &times;
          </button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
          <div class="cart-total">
            <span>Total</span>
            <strong id="cart-total">$0.00</strong>
          </div>
          <button class="btn primary" id="checkout">Checkout</button>
        </div>
      </div>
      <div id="cart-backdrop" class="cart-backdrop"></div>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
